<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linear Algebra Academy</title>
  <!-- Tailwind CDN (instant beautiful styling) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- KaTeX for perfect math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <style>
    .katex { font-size: 1.1em; }
    .lesson { display: none; }
    .lesson.active { display: block; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 flex min-h-screen">

  <!-- Sidebar Navigation (Khan-style) -->
  <div class="w-72 bg-zinc-900 p-6 flex flex-col">
    <h1 class="text-3xl font-bold text-emerald-400 mb-8">LA Academy</h1>
    
    <div class="mb-8">
      <div class="text-sm text-zinc-400 mb-2">YOUR PROGRESS</div>
      <div id="overallProgress" class="h-3 bg-zinc-700 rounded-full overflow-hidden">
        <div class="h-full bg-emerald-400 w-0 transition-all" id="progressBar"></div>
      </div>
      <div id="progressText" class="text-xs text-zinc-400 mt-1">0% complete</div>
    </div>

    <nav class="flex-1 space-y-1 text-sm" id="chapterList">
      <!-- Populated by JS -->
    </nav>

    <button onclick="resetProgress()" 
            class="mt-auto text-xs text-zinc-500 hover:text-red-400 transition">
      Reset All Progress
    </button>
  </div>

  <!-- Main Content Area -->
  <div class="flex-1 p-10 overflow-auto" id="mainContent">
    <h2 id="lessonTitle" class="text-4xl font-bold mb-6"></h2>
    <div id="lessonBody" class="prose prose-invert max-w-3xl"></div>
    
    <!-- Quiz Section (Khan-style immediate feedback) -->
    <div id="quizContainer" class="mt-12 hidden">
      <h3 class="text-2xl font-semibold mb-4">Practice Problem</h3>
      <div id="quizQuestion" class="text-lg mb-6"></div>
      <div id="quizOptions" class="space-y-3"></div>
      <div id="quizFeedback" class="mt-6 text-lg font-medium"></div>
    </div>
  </div>

<script>
// ==================== DATA & PROGRESS ====================
let currentLesson = "0-0";
const progressKey = "laProgress";
let progress = JSON.parse(localStorage.getItem(progressKey)) || {};
let course = null;

// ==================== LOAD COURSE ====================
async function loadCourse() {
  try {
    console.log("Starting fetch for courses/linear-algebra.json...");
    const response = await fetch('courses/linear-algebra.json');
    if (!response.ok) {
      throw new Error(`Fetch error: ${response.status} ${response.statusText}`);
    }
    course = await response.json();
    console.log("JSON loaded successfully!");
    console.log("Title:", course.title);
    console.log("Chapters count:", course.chapters?.length || 0);

    buildNav();
    updateProgressBar();
    loadLesson(0, 0); // safe if chapter 0 exists
  } catch (error) {
    console.error("Load failed:", error);
    document.getElementById("mainContent").innerHTML = `
      <h2 class="text-4xl font-bold text-red-400 mb-6">Course Data Failed to Load</h2>
      <p class="text-lg">${error.message}</p>
      <p class="mt-4">
        • Direct link test: <a href="/courses/linear-algebra.json" target="_blank" class="text-emerald-400 underline">Open JSON</a><br>
        • If blank/404: wait 5-15 min after push, clear cache (Ctrl+Shift+R), check case sensitivity<br>
        • Console (F12) for details
      </p>
    `;
  }
}

// ==================== MATH ====================
function renderMath() {
  renderMathInElement(document.body, {
    delimiters: [
      {left: "$$", right: "$$", display: true},
      {left: "$", right: "$", display: false}
    ]
  });
}

// ==================== NAVIGATION ====================
function buildNav() {
  if (!course || !course.chapters) {
    console.warn("No course data for nav");
    return;
  }
  const nav = document.getElementById("chapterList");
  nav.innerHTML = "";
  course.chapters.forEach((ch, i) => {
    const div = document.createElement("div");
    div.className = "mb-6";

    let lessonsHtml = "";
    if (ch.lessons && ch.lessons.length > 0) {
      lessonsHtml = ch.lessons.map((les, j) => `
        <button onclick="loadLesson(${i},${j})"
                class="w-full text-left px-4 py-2 hover:bg-zinc-800 rounded-lg transition flex justify-between items-center ${progress[`${i}-${j}`] ? 'line-through text-emerald-400' : ''}">
          ${les.title || "Untitled Lesson"}
          ${progress[`${i}-${j}`] ? '✅' : ''}
        </button>
      `).join("");
    } else {
      lessonsHtml = '<p class="text-zinc-500 px-4 py-2 italic">No lessons added yet</p>';
    }

    div.innerHTML = `
      <div class="font-medium text-emerald-300 mb-2">${ch.title || "Untitled Chapter"}</div>
      ${lessonsHtml}
    `;
    nav.appendChild(div);
  });
  console.log("Sidebar navigation built");
}

// ==================== PROGRESS BAR ====================
function updateProgressBar() {
  if (!course || !course.chapters) return;
  const total = course.chapters.reduce((sum, ch) => sum + (ch.lessons?.length || 0), 0);
  const done = Object.keys(progress).filter(k => !k.endsWith("-mastered")).length;
  const percent = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById("progressBar").style.width = percent + "%";
  document.getElementById("progressText").textContent = percent + "% complete";
}

// ==================== LOAD LESSON ====================
function loadLesson(chIdx, lesIdx) {
  if (!course || !course.chapters?.[chIdx]?.lessons?.[lesIdx]) {
    console.warn("Invalid lesson index:", chIdx, lesIdx);
    return;
  }
  currentLesson = `${chIdx}-${lesIdx}`;
  const lesson = course.chapters[chIdx].lessons[lesIdx];

  document.getElementById("lessonTitle").textContent = lesson.title || "No Title";
  document.getElementById("lessonBody").innerHTML = lesson.body || "<p>No content yet.</p>";

  const quizDiv = document.getElementById("quizContainer");
  if (lesson.quiz && lesson.quiz.options && lesson.quiz.ans != null) {
    quizDiv.classList.remove("hidden");
    document.getElementById("quizQuestion").innerHTML = lesson.quiz.q || "Question missing";
    const opts = document.getElementById("quizOptions");
    opts.innerHTML = lesson.quiz.options.map((opt, i) => `
      <button onclick="checkAnswer(${i})" class="w-full text-left px-6 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-xl transition">
        ${opt}
      </button>
    `).join("");
    document.getElementById("quizFeedback").innerHTML = "";
  } else {
    quizDiv.classList.add("hidden");
  }

  renderMath();

  progress[currentLesson] = true;
  localStorage.setItem(progressKey, JSON.stringify(progress));
  buildNav();
  updateProgressBar();
}

// ==================== QUIZ ====================
function checkAnswer(selected) {
  if (!course) return;
  const [chIdx, lesIdx] = currentLesson.split("-").map(Number);
  const lesson = course.chapters[chIdx]?.lessons?.[lesIdx];
  if (!lesson?.quiz) return;

  const correct = lesson.quiz.ans;
  const feedback = document.getElementById("quizFeedback");

  if (selected === correct) {
    feedback.innerHTML = `<span class="text-emerald-400">✅ Correct!</span>`;
    progress[currentLesson + "-mastered"] = true;
  } else {
    feedback.innerHTML = `<span class="text-red-400">Incorrect. Correct: ${lesson.quiz.options[correct]}</span>`;
  }
  localStorage.setItem(progressKey, JSON.stringify(progress));
  buildNav();
}

function resetProgress() {
  if (confirm("Reset all progress?")) {
    localStorage.removeItem(progressKey);
    progress = {};
    buildNav();
    updateProgressBar();
  }
}

// ==================== INIT ====================
window.onload = () => {
  tailwind.config = { content: ["*"] };
  loadCourse();  // everything starts here
};
</script>
</body>
</html>
